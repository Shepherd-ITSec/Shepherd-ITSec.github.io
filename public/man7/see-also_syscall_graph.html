            <script>
function neighbourhoodHighlight(params) {
  // console.log("in nieghbourhoodhighlight");
  allNodes = nodes.get({ returnType: "Object" });
  // originalNodes = JSON.parse(JSON.stringify(allNodes));
  // if something is selected:
  if (params.nodes.length > 0) {
    highlightActive = true;
    var i, j;
    var selectedNode = params.nodes[0];
    var degrees = 2;

    // mark all nodes as hard to read.
    for (let nodeId in allNodes) {
      // nodeColors[nodeId] = allNodes[nodeId].color;
      allNodes[nodeId].color = "rgba(200,200,200,0.5)";
      if (allNodes[nodeId].hiddenLabel === undefined) {
        allNodes[nodeId].hiddenLabel = allNodes[nodeId].label;
        allNodes[nodeId].label = undefined;
      }
    }
    var connectedNodes = network.getConnectedNodes(selectedNode);
    var allConnectedNodes = [];

    // get the second degree nodes
    for (i = 1; i < degrees; i++) {
      for (j = 0; j < connectedNodes.length; j++) {
        allConnectedNodes = allConnectedNodes.concat(
          network.getConnectedNodes(connectedNodes[j])
        );
      }
    }

    // all second degree nodes get a different color and their label back
    for (i = 0; i < allConnectedNodes.length; i++) {
      // allNodes[allConnectedNodes[i]].color = "pink";
      allNodes[allConnectedNodes[i]].color = "rgba(150,150,150,0.75)";
      if (allNodes[allConnectedNodes[i]].hiddenLabel !== undefined) {
        allNodes[allConnectedNodes[i]].label =
          allNodes[allConnectedNodes[i]].hiddenLabel;
        allNodes[allConnectedNodes[i]].hiddenLabel = undefined;
      }
    }

    // all first degree nodes get their own color and their label back
    for (i = 0; i < connectedNodes.length; i++) {
      // allNodes[connectedNodes[i]].color = undefined;
      allNodes[connectedNodes[i]].color = nodeColors[connectedNodes[i]];
      if (allNodes[connectedNodes[i]].hiddenLabel !== undefined) {
        allNodes[connectedNodes[i]].label =
          allNodes[connectedNodes[i]].hiddenLabel;
        allNodes[connectedNodes[i]].hiddenLabel = undefined;
      }
    }

    // the main node gets its own color and its label back.
    // allNodes[selectedNode].color = undefined;
    allNodes[selectedNode].color = nodeColors[selectedNode];
    if (allNodes[selectedNode].hiddenLabel !== undefined) {
      allNodes[selectedNode].label = allNodes[selectedNode].hiddenLabel;
      allNodes[selectedNode].hiddenLabel = undefined;
    }
  } else if (highlightActive === true) {
    // console.log("highlightActive was true");
    // reset all nodes
    for (let nodeId in allNodes) {
      // allNodes[nodeId].color = "purple";
      allNodes[nodeId].color = nodeColors[nodeId];
      // delete allNodes[nodeId].color;
      if (allNodes[nodeId].hiddenLabel !== undefined) {
        allNodes[nodeId].label = allNodes[nodeId].hiddenLabel;
        allNodes[nodeId].hiddenLabel = undefined;
      }
    }
    highlightActive = false;
  }

  // transform the object into an array
  var updateArray = [];
  if (params.nodes.length > 0) {
    for (let nodeId in allNodes) {
      if (allNodes.hasOwnProperty(nodeId)) {
        // console.log(allNodes[nodeId]);
        updateArray.push(allNodes[nodeId]);
      }
    }
    nodes.update(updateArray);
  } else {
    // console.log("Nothing was selected");
    for (let nodeId in allNodes) {
      if (allNodes.hasOwnProperty(nodeId)) {
        // console.log(allNodes[nodeId]);
        // allNodes[nodeId].color = {};
        updateArray.push(allNodes[nodeId]);
      }
    }
    nodes.update(updateArray);
  }
}

function filterHighlight(params) {
  allNodes = nodes.get({ returnType: "Object" });
  // if something is selected:
  if (params.nodes.length > 0) {
    filterActive = true;
    let selectedNodes = params.nodes;

    // hiding all nodes and saving the label
    for (let nodeId in allNodes) {
      allNodes[nodeId].hidden = true;
      if (allNodes[nodeId].savedLabel === undefined) {
        allNodes[nodeId].savedLabel = allNodes[nodeId].label;
        allNodes[nodeId].label = undefined;
      }
    }

    for (let i=0; i < selectedNodes.length; i++) {
      allNodes[selectedNodes[i]].hidden = false;
      if (allNodes[selectedNodes[i]].savedLabel !== undefined) {
        allNodes[selectedNodes[i]].label = allNodes[selectedNodes[i]].savedLabel;
        allNodes[selectedNodes[i]].savedLabel = undefined;
      }
    }

  } else if (filterActive === true) {
    // reset all nodes
    for (let nodeId in allNodes) {
      allNodes[nodeId].hidden = false;
      if (allNodes[nodeId].savedLabel !== undefined) {
        allNodes[nodeId].label = allNodes[nodeId].savedLabel;
        allNodes[nodeId].savedLabel = undefined;
      }
    }
    filterActive = false;
  }

  // transform the object into an array
  var updateArray = [];
  if (params.nodes.length > 0) {
    for (let nodeId in allNodes) {
      if (allNodes.hasOwnProperty(nodeId)) {
        updateArray.push(allNodes[nodeId]);
      }
    }
    nodes.update(updateArray);
  } else {
    for (let nodeId in allNodes) {
      if (allNodes.hasOwnProperty(nodeId)) {
        updateArray.push(allNodes[nodeId]);
      }
    }
    nodes.update(updateArray);
  }
}

function selectNode(nodes) {
  network.selectNodes(nodes);
  neighbourhoodHighlight({ nodes: nodes });
  return nodes;
}

function selectNodes(nodes) {
  network.selectNodes(nodes);
  filterHighlight({nodes: nodes});
  return nodes;
}

function highlightFilter(filter) {
  let selectedNodes = []
  let selectedProp = filter['property']
  if (filter['item'] === 'node') {
    let allNodes = nodes.get({ returnType: "Object" });
    for (let nodeId in allNodes) {
      if (allNodes[nodeId][selectedProp] && filter['value'].includes((allNodes[nodeId][selectedProp]).toString())) {
        selectedNodes.push(nodeId)
      }
    }
  }
  else if (filter['item'] === 'edge'){
    let allEdges = edges.get({returnType: 'object'});
    // check if the selected property exists for selected edge and select the nodes connected to the edge
    for (let edge in allEdges) {
      if (allEdges[edge][selectedProp] && filter['value'].includes((allEdges[edge][selectedProp]).toString())) {
        selectedNodes.push(allEdges[edge]['from'])
        selectedNodes.push(allEdges[edge]['to'])
      }
    }
  }
  selectNodes(selectedNodes)
}

<div id="controls">
  <h3>Syscall graph controls</h3>

  <label for="searchBox">Search (substring)</label>
  <input id="searchBox" type="text" placeholder="e.g. open, write, execve" />

  <label for="degreeFilter">Min degree: <span id="degreeValue"></span></label>
  <input id="degreeFilter" type="range" min="0" max="200" step="1" value="0" />

  <button id="resetBtn" type="button">Reset highlight + filter</button>
  <div class="small">
    - Click a node to highlight its neighbors.<br/>

<script>
  // Snapshot the initial datasets + appearance so we can always restore.
  var originalNodes = nodes.get();
  var originalEdges = edges.get();
  var originalNodeById = new Map(originalNodes.map(function(n){ return [n.id, n]; }));
  var originalEdgeByKey = new Map(originalEdges.map(function(e){ return [String(e.from) + "→" + String(e.to), e]; }));

  function escapeHtml(text) {
    var s = (text === undefined || text === null) ? "" : String(text);
    return s
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/\"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  // Titles may contain arbitrary HTML; sanitize to safe plain text.
  function sanitizeTitle(title) {
    var raw = (title === undefined || title === null) ? "" : String(title);
    if (!raw) return raw;

    // Parse as HTML so we can recover text even from broken markup.
    var div = document.createElement("div");
    div.innerHTML = raw;

    // Strip scripts/styles.
    var scripts = div.getElementsByTagName("script");
    for (var si = scripts.length - 1; si >= 0; si--) scripts[si].parentNode.removeChild(scripts[si]);
    var styles = div.getElementsByTagName("style");
    for (var sti = styles.length - 1; sti >= 0; sti--) styles[sti].parentNode.removeChild(styles[sti]);

    // Convert <br> to explicit newlines so text doesn't run together.
    var brs = div.getElementsByTagName("br");
    for (var bi = brs.length - 1; bi >= 0; bi--) {
      var br = brs[bi];
      if (br.parentNode) br.parentNode.replaceChild(document.createTextNode("\n"), br);
    }

    // vis-network tooltips may treat `title` as plain text depending on config,
    // so always return plain text (no tags). Keep line breaks readable.
    var text = div.textContent || div.innerText || raw;
    text = String(text).replace(/\r\n/g, "\n").replace(/\r/g, "\n").trim();
    return text;
  }

  function computeDegrees(nodeList, edgeList) {
    var deg = {};
    nodeList.forEach(function(n){ deg[n.id] = 0; });
    edgeList.forEach(function(e){
      if (deg[e.from] !== undefined) deg[e.from] += 1;
      if (deg[e.to] !== undefined) deg[e.to] += 1;
    });
    return deg;
  }

  var degrees = computeDegrees(originalNodes, originalEdges);
  var maxDeg = Math.max.apply(Math, [0].concat(Object.values(degrees)));
  var degreeFilter = document.getElementById('degreeFilter');
  var degreeValue = document.getElementById('degreeValue');
  degreeFilter.max = String(Math.max(10, maxDeg));

  function restoreAppearance() {
    var nUpdates = nodes.get().map(function(n){
      var o = originalNodeById.get(n.id) || {};
      return { id: n.id, color: o.color, font: o.font, title: sanitizeTitle((o.title !== undefined && o.title !== null) ? o.title : n.title) };
    });
    nodes.update(nUpdates);

    var eUpdates = edges.get().map(function(e){
      var key = String(e.from) + "→" + String(e.to);
      var o = originalEdgeByKey.get(key) || {};
      return { id: e.id, color: (o.color !== undefined && o.color !== null) ? o.color : e.color, hidden: false, width: o.width };
    });
    edges.update(eUpdates);
  }

  function applyDegreeFilter(minDeg) {
    var allowed = new Set(originalNodes.filter(function(n){ return (degrees[n.id] || 0) >= minDeg; }).map(function(n){ return n.id; }));
    var filteredNodes = originalNodes
      .filter(function(n){ return allowed.has(n.id); })
      .map(function(n){ var nn = Object.assign({}, n); nn.title = sanitizeTitle(n.title); return nn; });
    var filteredEdges = originalEdges.filter(function(e){ return allowed.has(e.from) && allowed.has(e.to); });
    nodes.clear(); edges.clear();
    nodes.add(filteredNodes); edges.add(filteredEdges);
    restoreAppearance();
  }

  function resetAll() {
    nodes.clear(); edges.clear();
    nodes.add(originalNodes.map(function(n){ var nn = Object.assign({}, n); nn.title = sanitizeTitle(n.title); return nn; }));
    edges.add(originalEdges);
    degreeFilter.value = "0";
    degreeValue.textContent = "0";
    network.unselectAll();
    restoreAppearance();
    try { network.setOptions({ physics: { enabled: false } }); } catch (e) {}
  }

  function highlightNeighbors(focusId) {
    var connected = new Set(network.getConnectedNodes(focusId));
    connected.add(focusId);

    var nodeUpdates = nodes.get().map(function(n){
      var isOn = connected.has(n.id);
      var o = originalNodeById.get(n.id) || {};
      return {
        id: n.id,
        color: isOn
          ? { background: "#F58518", border: "#B85A00" }
          : { background: "rgba(199,199,199,0.18)", border: "rgba(153,153,153,0.18)" },
        // Use a light label color so it's readable on dark background.
        font: isOn ? { color: "#F9FAFB" } : { color: "rgba(229,231,235,0.45)" },
        title: sanitizeTitle((o.title !== undefined && o.title !== null) ? o.title : n.title),
      };
    });
    nodes.update(nodeUpdates);

    var edgeUpdates = edges.get().map(function(e){
      var on = connected.has(e.from) && connected.has(e.to);
      return { id: e.id, hidden: !on, color: on ? "rgba(255,255,255,0.45)" : "rgba(255,255,255,0.05)", width: on ? 2 : 1 };
    });
    edges.update(edgeUpdates);
  }

  var MIN_DEGREE_DEFAULT = 20;
  degreeFilter.value = String(MIN_DEGREE_DEFAULT);
  degreeValue.textContent = String(MIN_DEGREE_DEFAULT);
  if (MIN_DEGREE_DEFAULT > 0) applyDegreeFilter(MIN_DEGREE_DEFAULT);
  try { network.setOptions({ physics: { enabled: false } }); } catch (e) {}

  degreeFilter.addEventListener('input', function(e){
    var v = Number(e.target.value || 0);
    degreeValue.textContent = String(v);
    applyDegreeFilter(v);
  });

  document.getElementById('resetBtn').addEventListener('click', function(){ resetAll(); });

  var searchBox = document.getElementById('searchBox');
  var searchTimer = null;
  searchBox.addEventListener('input', function(){
    if (searchTimer) clearTimeout(searchTimer);
    searchTimer = setTimeout(function(){
      var q = (searchBox.value || "").trim().toLowerCase();
      if (!q) return;
      var nodeList = nodes.get();
      var best = null;
      for (var i = 0; i < nodeList.length; i++) {
        var n = nodeList[i];
        var label = String(n.label || n.id || "").toLowerCase();
        if (!label.includes(q)) continue;
        var score = (label === q ? 1000 : label.startsWith(q) ? 100 : 0) - label.length;
        if (!best || score > best.score) best = { id: n.id, score };
      }
      if (best) {
        network.selectNodes([best.id]);
        network.focus(best.id, { scale: 1.6, animation: { duration: 300 } });
        highlightNeighbors(best.id);
      }
    }, 120);
  });

  network.on('click', function(params){
    if (params.nodes && params.nodes.length > 0) {
      highlightNeighbors(params.nodes[0]);
      return;
    }
    if (params.event && params.event.srcEvent && params.event.srcEvent.shiftKey) {
      var minDeg = Number(degreeFilter.value || 0);
      applyDegreeFilter(minDeg);
      network.unselectAll();
      restoreAppearance();
    }
  });
</script>
